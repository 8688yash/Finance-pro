<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MarinerCash Pro | Seafarer Wealth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --primary: #38bdf8;
            --accent: #818cf8;
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.8);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #020617);
            color: #f1f5f9;
            min-height: 100-screen;
        }

        .glass {
            background: var(--card);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .nav-blur {
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(8px);
        }

        .stat-card {
            transition: transform 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        input, select {
            background: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }

        input:focus {
            border-color: var(--primary) !important;
            ring: 1px solid var(--primary);
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="pb-24">

    <nav class="sticky top-0 z-50 nav-blur border-b border-white/5 p-4 mb-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-800 tracking-tighter text-white flex items-center gap-2">
                    <span class="text-sky-400">⚓</span> MARINERCASH <span class="text-xs bg-sky-500/20 text-sky-400 px-2 py-1 rounded-full uppercase ml-2">Pro</span>
                </h1>
            </div>
            <div class="flex gap-4">
                <button onclick="exportData()" class="text-slate-400 hover:text-white text-sm">Export</button>
                <button onclick="clearAllData()" class="text-rose-400/70 hover:text-rose-400 text-sm">Reset</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 space-y-6">
        
        <section class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="glass p-6 rounded-3xl md:col-span-2">
                <p class="text-slate-400 text-xs font-semibold uppercase tracking-widest mb-1">Total Net Worth</p>
                <h2 id="total-net-worth" class="text-4xl font-bold text-white mb-6">$0.00</h2>
                
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                    <div class="stat-card p-3 rounded-2xl bg-white/5 border border-white/5">
                        <p class="text-[10px] text-slate-400 uppercase">NRE Account</p>
                        <p id="stat-nre" class="text-sm font-bold text-sky-400">$0</p>
                    </div>
                    <div class="stat-card p-3 rounded-2xl bg-white/5 border border-white/5">
                        <p class="text-[10px] text-slate-400 uppercase">Physical Cash</p>
                        <p id="stat-cash" class="text-sm font-bold text-emerald-400">$0</p>
                    </div>
                    <div class="stat-card p-3 rounded-2xl bg-white/5 border border-white/5">
                        <p class="text-[10px] text-slate-400 uppercase">Loan Balance</p>
                        <p id="stat-loan" class="text-sm font-bold text-rose-400">$0</p>
                    </div>
                    <div class="stat-card p-3 rounded-2xl bg-white/5 border border-white/5">
                        <p class="text-[10px] text-slate-400 uppercase">Savings Rate</p>
                        <p id="stat-savings" class="text-sm font-bold text-indigo-400">0%</p>
                    </div>
                </div>
            </div>

            <div class="glass p-6 rounded-3xl flex flex-col justify-center">
                <canvas id="miniChart" height="150"></canvas>
            </div>
        </section>

        <section class="glass p-6 rounded-3xl">
            <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-sky-400"><path d="M12 5v14M5 12h14"/></svg>
                New Entry
            </h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-4">
                    <select id="entry-category" class="w-full p-3 rounded-xl outline-none transition">
                        <option value="" disabled selected>Select Category</option>
                        <optgroup label="Income Sources">
                            <option value="Monthly Allotment">Monthly Allotment</option>
                            <option value="Cash Advance">Cash Advance (Onboard)</option>
                            <option value="Bank Interest">NRE Interest / Other</option>
                        </optgroup>
                        <optgroup label="Standard Expenses">
                            <option value="Shore Leave">Shore Leave Expense</option>
                            <option value="Bond Store">Bond Store Expense</option>
                            <option value="Loan Installment">Loan Installment</option>
                            <option value="Family Expense">Family Remittance</option>
                            <option value="Other Expense">Misc Expense</option>
                        </optgroup>
                    </select>

                    <input id="entry-desc" type="text" placeholder="Description (e.g., Port Singapore)" class="w-full p-3 rounded-xl outline-none">
                </div>

                <div class="space-y-4">
                    <div class="flex gap-2">
                        <input id="entry-amount" type="number" placeholder="Amount ($)" class="flex-1 p-3 rounded-xl outline-none">
                        <select id="entry-type" class="w-32 p-3 rounded-xl outline-none">
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                    <button onclick="handleNewEntry()" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-900 font-bold py-3 rounded-xl shadow-lg shadow-sky-500/20 transition-all active:scale-95">
                        Add to Log
                    </button>
                </div>
            </div>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 space-y-4">
                <h3 class="font-bold text-slate-400 px-2 uppercase text-xs tracking-widest">Monthly Analysis</h3>
                <div id="monthly-insights" class="space-y-3">
                    </div>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h3 class="font-bold text-slate-400 uppercase text-xs tracking-widest">Recent Activity</h3>
                    <span id="entry-count" class="text-[10px] bg-white/10 px-2 py-1 rounded-md">0 Entries</span>
                </div>
                <div id="activity-log" class="space-y-3 max-h-[500px] overflow-y-auto custom-scroll pr-2">
                    </div>
            </div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 glass px-6 py-3 rounded-full text-sm font-bold opacity-0 transition-all duration-300 pointer-events-none z-[100]"></div>

    <script>
        let data = JSON.parse(localStorage.getItem('mariner_data')) || [];
        let chartInstance = null;

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('opacity-100', '-translate-y-4');
            setTimeout(() => t.classList.remove('opacity-100', '-translate-y-4'), 3000);
        }

        function handleNewEntry() {
            const cat = document.getElementById('entry-category').value;
            const desc = document.getElementById('entry-desc').value;
            const amt = parseFloat(document.getElementById('entry-amount').value);
            const type = document.getElementById('entry-type').value;

            if (!cat || isNaN(amt) || amt <= 0) {
                showToast("⚠️ Fill all fields correctly");
                return;
            }

            const entry = {
                id: Date.now(),
                category: cat,
                description: desc || cat,
                amount: amt,
                type: type,
                date: new Date().toISOString()
            };

            data.unshift(entry);
            saveAndUpdate();
            
            // Clear inputs
            document.getElementById('entry-amount').value = '';
            document.getElementById('entry-desc').value = '';
            showToast("✅ Record Added");
        }

        function saveAndUpdate() {
            localStorage.setItem('mariner_data', JSON.stringify(data));
            renderDashboard();
        }

        function deleteEntry(id) {
            data = data.filter(e => e.id !== id);
            saveAndUpdate();
        }

        function renderDashboard() {
            const logEl = document.getElementById('activity-log');
            const insightEl = document.getElementById('monthly-insights');
            logEl.innerHTML = '';
            insightEl.innerHTML = '';

            let totals = { income: 0, expense: 0, nre: 0, cash: 0, loan: 0 };
            const monthlyData = {};

            data.forEach(e => {
                // Calculate Totals
                if (e.type === 'income') totals.income += e.amount;
                else totals.expense += e.amount;

                if (e.category === 'Monthly Allotment' || e.category === 'Bank Interest') totals.nre += e.amount;
                if (e.category === 'Cash Advance') totals.cash += e.amount;
                if (e.category === 'Loan Installment') totals.loan += e.amount;
                if (e.category === 'Shore Leave' || e.category === 'Bond Store') totals.cash -= e.amount;

                // Monthly Grouping
                const month = new Date(e.date).toLocaleString('default', { month: 'long', year: 'numeric' });
                if (!monthlyData[month]) monthlyData[month] = { inc: 0, exp: 0 };
                if (e.type === 'income') monthlyData[month].inc += e.amount;
                else monthlyData[month].exp += e.amount;

                // Render Log
                const isInc = e.type === 'income';
                logEl.innerHTML += `
                    <div class="glass p-4 rounded-2xl flex justify-between items-center group border-l-4 ${isInc ? 'border-emerald-500' : 'border-rose-500'}">
                        <div>
                            <p class="text-xs text-sky-400 font-bold uppercase tracking-tighter">${e.category}</p>
                            <p class="font-semibold text-white">${e.description}</p>
                            <p class="text-[10px] text-slate-500">${new Date(e.date).toLocaleDateString()}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold ${isInc ? 'text-emerald-400' : 'text-rose-400'}">
                                ${isInc ? '+' : '-'}$${e.amount.toLocaleString()}
                            </p>
                            <button onclick="deleteEntry(${e.id})" class="text-[10px] text-slate-600 hover:text-rose-400 opacity-0 group-hover:opacity-100 transition">Delete</button>
                        </div>
                    </div>
                `;
            });

            // Update Top Stats
            document.getElementById('total-net-worth').innerText = `$${(totals.income - totals.expense).toLocaleString()}`;
            document.getElementById('stat-nre').innerText = `$${totals.nre.toLocaleString()}`;
            document.getElementById('stat-cash').innerText = `$${totals.cash.toLocaleString()}`;
            document.getElementById('stat-loan').innerText = `$${totals.loan.toLocaleString()}`;
            const sRate = totals.income > 0 ? ((totals.income - totals.expense) / totals.income * 100).toFixed(1) : 0;
            document.getElementById('stat-savings').innerText = `${sRate}%`;

            // Render Monthly Insights
            Object.keys(monthlyData).forEach(m => {
                const mInfo = monthlyData[m];
                const net = mInfo.inc - mInfo.exp;
                insightEl.innerHTML += `
                    <div class="glass p-4 rounded-2xl border border-white/5">
                        <div class="flex justify-between items-center mb-2">
                            <h4 class="font-bold text-sm text-slate-200">${m}</h4>
                            <span class="text-[10px] px-2 py-0.5 rounded-full bg-sky-500/10 text-sky-400">Net: $${net.toLocaleString()}</span>
                        </div>
                        <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden flex">
                            <div style="width: ${mInfo.inc > 0 ? (mInfo.exp / mInfo.inc * 100) : 0}%" class="bg-rose-500 h-full"></div>
                        </div>
                        <div class="flex justify-between mt-2 text-[10px]">
                            <span class="text-emerald-400">In: $${mInfo.inc.toLocaleString()}</span>
                            <span class="text-rose-400">Out: $${mInfo.exp.toLocaleString()}</span>
                        </div>
                    </div>
                `;
            });

            updateChart(totals);
        }

        function updateChart(totals) {
            const ctx = document.getElementById('miniChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Income', 'Expense'],
                    datasets: [{
                        data: [totals.income, totals.expense],
                        backgroundColor: ['#38bdf8', '#f43f5e'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    cutout: '80%',
                    plugins: { legend: { display: false } }
                }
            });
        }

        function clearAllData() {
            if(confirm("Wipe all financial records?")) {
                data = [];
                saveAndUpdate();
                showToast("Data Cleared");
            }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(data, null, 2)], {type : 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `mariner-finance-${new Date().toLocaleDateString()}.json`;
            a.click();
        }

        // Init
        renderDashboard();
    </script>
</body>
</html>
